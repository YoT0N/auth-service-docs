site_name: Auth Service Documentation
site_description: Documentation as Code for Auth Service microservice
site_author: Ільків Богдан
docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Home: README.md
  - Architecture:
      - System Specification (SSD): architecture/SSD.md
      - Software Design (SDD): architecture/SDD.md
      - Infrastructure (ISD): architecture/ISD.md
  - Quality Assurance:
      - Test Strategy: quality/test-strategy.md
      - Traceability Matrix: quality/traceability-matrix.md
  - Developer:
      - Onboarding Guide: developer/onboarding.md

markdown_extensions:
  - tables
  - fenced_code
  - toc:
      permalink: true
  - admonition

plugins:
  - search
